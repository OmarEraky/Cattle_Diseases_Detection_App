name: cattle_disease_app
description: A complete offline-first cattle disease detection mobile application using bundled YOLO segmentation and disease classification models.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Image selection and processing
  image_picker: ^1.0.7
  image: ^4.1.3
  path_provider: ^2.1.2

  # Machine learning inference
  tflite_flutter: ^0.12.1

  # Device permissions
  permission_handler: ^11.3.0

  # Icon symbols
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
