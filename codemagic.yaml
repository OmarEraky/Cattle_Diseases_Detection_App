workflows:
  ios-test-build:
    name: iOS Test Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Show project files
        script: |
          ls
          ls ios
          ls ios/Runner.xcodeproj/xcshareddata/xcschemes || true

      - name: Flutter clean
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS without code signing
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphoneos/Runner.app
